<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VITAL — My Account</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #05070a; --surface: #0c1018; --surface2: #111827; --border: rgba(255,255,255,0.06); --text: #f0f4ff; --muted: #6b7a99; --accent: #00e5a0; --bad: #ff6b6b; }
body { background: var(--bg); color: var(--text); font-family: "DM Mono", monospace; min-height: 100vh; overflow-x: hidden; }
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 70% 50% at 20% 10%, rgba(0,229,160,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,92,250,0.07) 0%, transparent 60%); }
.panel { position: fixed; top: 0; right: 0; width: 100%; max-width: 480px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 10; overflow-y: auto; transform: translateX(100%); animation: slideIn 0.3s ease forwards; }
@keyframes slideIn { to { transform: translateX(0); } }
.panel-header { display: flex; align-items: center; gap: 16px; padding: 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
.back-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; flex-shrink: 0; }
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.panel-title { font-family: "Syne", sans-serif; font-weight: 800; font-size: 18px; }
.panel-body { padding: 24px; }
.avatar-section { text-align: center; padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: "Syne", sans-serif; font-weight: 800; font-size: 28px; color: #000; margin: 0 auto 12px; }
.user-name { font-family: "Syne", sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 4px; }
.user-email { font-size: 11px; color: var(--muted); }
.section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.stat-val { font-family: "Syne", sans-serif; font-weight: 800; font-size: 24px; color: var(--accent); }
.stat-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.scan-list { margin-bottom: 24px; }
.scan-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.scan-age { font-family: "Syne", sans-serif; font-weight: 800; font-size: 28px; color: var(--accent); }
.scan-info { flex: 1; margin-left: 16px; }
.scan-date { font-size: 11px; color: var(--muted); }
.scan-diff { font-size: 11px; color: var(--text); margin-top: 2px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 12px; line-height: 1.8; }
.new-scan-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 16px; font-family: "Syne", sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; transition: all 0.15s; margin-bottom: 12px; }
.new-scan-btn:hover { background: #00ffb3; }
.signout-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 12px; padding: 14px; font-family: "DM Mono", monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.signout-btn:hover { border-color: var(--bad); color: var(--bad); }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="panel">
  <div class="panel-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="panel-title">My Account</div>
  </div>
  <div class="panel-body">
    <div class="avatar-section">
      <div class="avatar" id="avatar">?</div>
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-email" id="userEmail"></div>
    </div>

    <div class="section-label">Health Stats</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-val" id="totalScans">0</div>
        <div class="stat-label">Total Scans</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="latestBioAge">--</div>
        <div class="stat-label">Latest Bio Age</div>
      </div>
    </div>

    <div class="section-label">Scan History</div>
    <div class="scan-list" id="scanList">
      <div class="empty-state">No scans yet.<br>Complete your first scan to start tracking your biological age over time.</div>
    </div>

    <button class="new-scan-btn" onclick="goBack()">+ New Scan</button>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </div>
</div>

<script>
function goBack() {
  window.history.back();
}

function signOut() {
  localStorage.removeItem("vital_user");
  localStorage.removeItem("vital_session");
  localStorage.removeItem("vital_scans");
  window.location.href = "/auth.html";
}

function loadAccount() {
  var userStr = localStorage.getItem("vital_user");
  if (!userStr) { window.location.href = "/auth.html"; return; }
  var user = JSON.parse(userStr);
  var name = user.user_metadata?.full_name || user.email.split("@")[0];
  var initial = name.charAt(0).toUpperCase();
  document.getElementById("avatar").textContent = initial;
  document.getElementById("userName").textContent = name;
  document.getElementById("userEmail").textContent = user.email;

  var scans = JSON.parse(localStorage.getItem("vital_scans") || "[]");
  document.getElementById("totalScans").textContent = scans.length;

  if (scans.length > 0) {
    var latest = scans[scans.length - 1];
    document.getElementById("latestBioAge").textContent = latest.biologicalAge;
    var list = document.getElementById("scanList");
    list.innerHTML = "";
    var reversed = scans.slice().reverse();
    reversed.forEach(function(scan) {
      var date = new Date(scan.date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      list.innerHTML += '<div class="scan-item"><div class="scan-age">' + scan.biologicalAge + '</div><div class="scan-info"><div class="scan-date">' + date + '</div><div class="scan-diff">' + (scan.chronologicalAgeDiff || "") + '</div></div></div>';
    });
  }
}

loadAccount();
</script>
</body>
</html>
